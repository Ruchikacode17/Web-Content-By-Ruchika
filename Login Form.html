<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Ruchika Singh</title>
    
    <link href="main.css" rel="stylesheet" type="text/css">

    <style>
        /* 1. Global Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #FFDDA1; /* Matches your TATA project background */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* 2. Navigation & Back Button */
        .nav-container {
            position: absolute;
            top: 20px;
            left: 20px;
        }

        .back-btn {
            padding: 8px 15px;
            background: #333;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            font-size: 14px;
            transition: 0.3s;
        }

        .back-btn:hover { background: maroon; }

        /* 3. Login Box Styling */
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        h2 {
            color: maroon;
            margin-bottom: 25px;
            font-family: 'Calibri', sans-serif;
            border-bottom: 2px solid #ddd;
            padding-bottom: 10px;
        }

        /* 4. Form Field Styling */
        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #5d4037;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
            outline: none;
        }

        input:focus {
            border-color: maroon;
            box-shadow: 0 0 5px rgba(128, 0, 0, 0.2);
        }

        /* 5. Button Styling */
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        input[type="submit"],
        input[type="reset"] {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
