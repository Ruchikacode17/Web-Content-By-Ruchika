<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fast Food Gallery | Apna Swad</title>
    
    <style>
        /* 1. Global Reset & Basic Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: background 0.4s ease;
            line-height: 1.6;
        }

        /* 2. Navigation & Back Button */
        nav {
            width: 90%;
            margin: 20px auto;
            text-align: center;
        }

        nav ol {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            list-style: none;
            gap: 10px;
        }

        nav ol li {
            background: yellow;
            padding: 15px 20px;
            border-radius: 8px;
            box-shadow: 5px 5px 10px rgba(0,0,0,0.2);
            transition: 0.3s;
            cursor: pointer;
        }

        nav ol li:hover {
            background: white;
            transform: scale(1.05);
        }

        nav a {
            text-decoration: none;
            color: blue;
            font-weight: bold;
        }

        .back-btn {
            background: #333;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 20px;
        }

        /* 3. Header Styling */
        header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            border: 2px solid black;
            padding: 20px;
            width: 90%;
            margin: 0 auto 30px auto;
            background: white;
            border-radius: 15px;
        }

        #col1 {
            width: 100px;
            height: 100px;
            border: 2px solid black;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #eee;
            overflow: hidden;
        }

        #col2 {
            flex: 1;
            text-align: center;
            padding: 10px;
        }

        /* 4. Gallery Grid */
        main {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 20px;
        }

        .cardstyle {
            width: 280px;
            height: 200px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            border-radius: 12px;
            overflow: hidden;
            background: white;
        }

        .pic {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Images stretch nahi hongi */
        }

        /* 5. Footer Styling */
        footer {
            background: #333;
            color: white;
            padding: 40px 20px;
            margin-top: 50px;
            text-align: center;
        }
