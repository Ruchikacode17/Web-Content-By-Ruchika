<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruchika Responsive Portfolio</title>
    
    <style>
        /* 1. Global Styles */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: Arial, sans-serif;
            transition: background 0.5s ease;
        }

        /* 2. Navigation - Fixed closing tags and hover */
        nav {
            width: 90%;
            margin: 20px auto;
            text-align: center;
        }

        nav ol {
            list-style: none;
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 0;
        }

        nav ol li {
            background: black;
            padding: 12px 20px;
            border-radius: 8px;
            box-shadow: 5px 5px 10px rgba(0,0,0,0.3);
            transition: 0.3s;
        }

        nav ol li a {
            color: orange;
            text-decoration: none;
            font-weight: bold;
        }

        nav ol li:hover {
            background: #333;
            transform: translateY(-3px);
        }

        /* 3. Header Setup */
        header {
            width: 90%;
            margin: auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            border: 2px solid #333;
            border-radius: 15px;
            background: white;
        }

        #col1 { width: 15%; }
        .profile { width: 100%; border-radius: 50%; border: 3px solid #333; }

        #col2 { width: 80%; text-align: center; font-family: 'Arial Black'; }
        .banner-pic { width: 100%; border-radius: 10px; height: auto; }

        /* 4. Main Gallery Grid */
        main {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
            gap: 20px;
        }

        .cardstyle {
            width: 300px; /* Base width */
            background: white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            border-radius: 10px;
            overflow: hidden;
            transition: 0.3s;
        }

        .cardstyle img { width: 100%; height: 200px; object-fit: cover; }

        .cardstyle:hover { transform: scale(1.03); }

        /* 5. Footer Section */
        footer {
            background: #f5f5dc;
            padding: 40px 20px;
            text-align: center;
            margin-top: 50px;
            border-top: 2px solid #ddd;
        }

        .footer-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            gap: 30px;
        }

        footer ul { list-style: none; padding: 0; }
        footer a { color: #650000; text-decoration: none; }
        footer a:hover { text-decoration: underline; }

        .social-icons { display: flex; justify-content: center; gap: 15px; margin-top: 10px; }
        .social-icons img { width: 40px; height: 40px; }

        /* --- RESPONSIVE BREAKPOINTS --- */

        /* Phones (max 600px) */
        @media screen and (max-width: 600px) {
            body { background: #FFDDA1; }
            #col2 { display: none; } /* Hides banner on small screens */
            #col1 { width: 40%; margin: auto; }
            nav ol { flex-direction: column; align-items: center; }
            .cardstyle { width: 90%; }
        }

        /* Tablets (min 601px) */
        @media screen and (min-width: 601px) {
            body { background: lavender; }
            .cardstyle { width: 45%; }
        }

        /* Desktop (min 992px) */
        @media screen and (min-width: 992px) {
            body { background: #e8f4f8; }
            .cardstyle { width: 22%; }
            header { width: 80%; }
        }
    </style>
</head>

<body>

    <nav>
        <ol>
            <li><a href="index.html">Home</a></li>
            <li><a href="#">Work</a></li>
            <li><a href="#">Project</a></li>
            <li><a href="https://pinterest.com" target="_blank">Pinterest</a></li>
        </ol>
    </nav>

    <header>
        <div id="col1">
            <img src="Images/a1.jpg" alt="Profile pic" class="profile">
        </div>
        <div id="col2">
            <h2 style="margin-bottom:10px;">MY CREATIVE BANNER</h2>
            <img src="Images/a11.jpg" class="banner-pic" alt="Banner">
        </div>
    </header>

    <main>
        <div class="cardstyle"><img src="Images/p1.jpg" alt="P1"></div>
        <div class="cardstyle"><img src="Images/p2.jpg" alt="P2"></div>
        <div class="cardstyle"><img src="Images/p3.jpg" alt="P3"></div>
        <div class="cardstyle"><img src="Images/p4.jpg" alt="P4"></div>
        <div class="cardstyle"><img src="Images/p5.jpg" alt="P5"></div>
        <div class="cardstyle"><img src="Images/p6.jpg" alt="P6"></div>
    </main>

    <footer>
        <div class="footer-container">
            <div id="info">
                <h3>&reg;</sup></h3>
                <p>Content Creator</p>
            </div>

            <div id="sitemap">
                <h4>Sitemap</h4>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="#">Projects</a></li>
                    <li><a href="https://pinterest.com">Pinterest</a></li>
                </ul>
            </div>

            <div id="socialmedia">
                <details>
                    <summary><strong>Social Media Links</strong></summary>
                    <div class="social-icons">
                        <a href="https://instagram.com"><img src="Images/I2.png" alt="Insta"></a>
                        <a href="https://google.com"><img src="Images/I3.png" alt="Google"></a>
                        <a href="https://youtube.com"><img src="Images/I1.png" alt="YouTube"></a>
                    </div>
                </details>
            </div>
        </div>
    </footer>

</body>
</html>
