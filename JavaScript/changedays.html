
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Days</title>
</head>
<style>

*{
    margin:0;
    padding:0;
    box-sizing: border-box;
}

body
{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    font-family:Arial, Helvetica, sans-serif;
}

h1{
    width:100%;
    height:70px;
    background:#622B14;
    color:#E4D6A9;
    text-align:center;
    border-radius:10px;
    font-size:40px;
    padding:10px;
}

header
{
    width:90%;
    margin:20px auto;
    box-shadow:10px 10px 10px gray;
    border-radius:15px;
    overflow:hidden;
}

header img
{
    width:100%;
    height:auto;
    display:block;
}


.btn-box{
    text-align:center;
    margin:20px 0;
}

.back-btn{
    display:inline-block;
    padding:12px 25px;
    background:#622B14;
    color:#E4D6A9;
    text-decoration:none;
    border-radius:30px;
    font-weight:bold;
    transition:0.3s;
}

.back-btn:hover{
    transform:scale(1.05);
    opacity:0.9;
}

footer
{
    background:#622B14;
    color:#E4D6A9;
    width:100%;
    height:70px;
    text-align: center;
    border-radius:10px;
    font-size:20px;
    display:flex;
    justify-content:center;
    align-items:center;
    margin-top:20px;
}

@media (max-width:768px)
{
    h1{
        font-size:24px;
        height:auto;
        padding:15px 10px;
    }

    header{
        width:95%;
    
    }

    .back-btn{
        padding:10px 20px;
        font-size:14px;
    }

    footer{
        font-size:14px;
        height:60px;
    }
}

</style>

<body>
<h1 id="m"> Image Of The </h1>

<header>
    <img id="pic" src="" alt="Day Image">
</header>

<div class="btn-box">
    <a href="Practice Page.html" class="back-btn">Back</a>
</div>

  <script>
    //Using Swtich Statement
    //Syntax
    var d = new Date();
    var m = document.getElementById("m")
    var pic = document.getElementById("pic")
    pic.src="images/a6.jpg"
    var today = d.getDay()

       switch(today)
       {
        case 1:
        m.innerHTML+= "Monday";
        pic.src="images/a11.jpg"
        break;

        case 2:
        m.innerHTML+= "Tuesday";
        pic.src="images/a3.jpg"
        break;

        case 3:
        m.innerHTML+= "Wednesday";
        pic.src="images/a18.jpg"
        break;

        case 4:
        m.innerHTML+= "Thursday";
        pic.src="images/a19.jpg"
        break;

        case 5:
        m.innerHTML+= "Friday";
        pic.src="images/m8.jpg"
        break;

        case 6:
        m.innerHTML+= "Saturday";
        pic.src="images/m9.jpg"
        break;

        case 0:
        m.innerHTML+= "Sunday";
        pic.src="images/m7.jpg"
        break;

        default:
        pic.src="images/s2.jpg"
       }
  </script>  

<footer>
    <p>© 2026 | All Rights Reserved |</p>
</footer>
</body>
</html>
