<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<Style>

body{
    padding: 0;
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background-color:#FEFEE3;
}


header

{
    font-size:30px;
    text-transform:uppercase;
    font-family:Arial black;
    background:#4C956C;
    color:#012611;
    text-align:center;
    box-sizing:border-box;
    padding:20px;
    box-shadow:5px 5px 5px rgb(158, 158, 158);
    width:100%;
    margin:auto;
    margin-bottom:50px;
    margin-top:20px;
 
}

footer{
    background:#4C956C;
    color:#012611;
    text-align:center;
    padding:20px;
    margin-top: 30px;
}



</Style>
<body>

    <header> Canvas Drawing </header>

    <canvas id="mycan" style="background:#FEFEE3" width="600" height="600"></canvas>
    <script>

        var c = document.getElementById("mycan");
        var k;
        var r = 10
        var d = c.getContext("2d");
        c.width = window.innerWidth;
        c.height = window.innerHeight;
        var red ,green ,blue ,drawcolor

        function f1(event)
        {
            //alert(event.keyCode)
            k = event.key
        switch(k)
            {
                case "r":
                    if(r<100)
                    {
                        r=r+1
                        document.title = r
                    }
                    break;

                case "t":
                    if(r>10)
                    {
                        r=r+1
                        document.title = r
                    }
                    break;

                case " ":
                    d.clearRect(0,0,window.innerWidth,window.innerHeight)
                    break;

            }
        }

        function draw(event)
        {
            //document.title = "x ="+event.pageX+" y ="+event.pageY
            var x = event.pageX
            var y = event.pageY
               red = Math.round(Math.random()*255)
                 green = Math.round(Math.random()*255)
                   blue = Math.round(Math.random()*255)
            drawcolor ="rgb("+red+", "+green+" , "+blue+")"

               d.beginPath();

               d.arc(x,y,r,0,2 * Math.PI);
               d.fillStyle = drawcolor
               d.fill()
               d.stroke();

        }

        document.addEventListener("keydown" ,f1)
        document.addEventListener("mousemove" ,draw)

    </script>

     <footer>
    <p> © 2026 | Practice Work By Ruchika</p>
   
        </footer>
    
</body>
</html>
