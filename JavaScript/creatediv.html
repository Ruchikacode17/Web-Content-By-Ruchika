<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Document</title>

<style>

.box{
    border-radius:10px;
    transition:0.50s;
    width:300px;
    border:2px black solid;
    position:absolute;
    top:100px;
    left:100px;
    text-align:center;
    background:#fff4e6;
    
}

.mystyle{
    /* background:grey; */
}

</style>

</head>

<body>

<script>

document.title = "Create Element"

var d = document.createElement("div");

document.body.appendChild(d);

d.className = "box mystyle";

d.innerHTML = "<button style='margin-top:10px; margin-left:210px;' onclick='closedilog()'>X</button>";

d.innerHTML += "<h1>Amazon</h1>";

d.innerHTML += "<hr color='green' size='3'/>";

d.innerHTML += "<img src='images/g2.gif' style='width:100%; height:160px; object-fit:cover;'>";
function closedilog()
{
    document.body.removeChild(d)
}

</script>

</body>
</html>
