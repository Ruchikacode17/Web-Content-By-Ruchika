<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=
, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <h1>Creating Tag By JavaScript</h1>

    <script>

        var p = document.createElement("img");

        document.body.style.background = "pink";
        document.body.appendChild{p};
           p.src="images/a13.jpg"
           p.style="transition:0.50s;margin:20px;border-radius:10px;cursor:pointer;"
           
           document.title = "No Error"
             p.style.width="30%"
             p.style.boxShadow="10px 10px 10px gray"

             p.onclick = function{}
             {
                p.src="images/a18.jpg"
             }

             p.onmouseout = function{}
             {
                p.src="images/pfp.jpg"
             }

             p.onmouseover = function{}
             {
                this.style.transform="scale{1.30}"
             }


    </script>
</body>
