<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    }

body{
        font-family:Arial, sans-serif;
        background:#ddbdf8;
        min-height:100vh;
        display:flex;
        flex-direction:column;
    }

header{
    background:#111827;
    color:white;
    text-align:center;
    padding:20px;
    font-size:30px;
    font-weight:bold;
    letter-spacing:2px;
}

main{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
}


.color-container{
    width:500px;
    min-height:500px;
    background:white;
    border-radius:20px;
    padding:20px;
    box-shadow:0px 0px 20px rgba(0,0,0,0.2);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    transition:0.5s;
}

.color-container h2{
    margin-bottom:20px;
    color:#111827;
}


button
    {
        width:25px;
        height:25px;
        border-radius:100px;
        box-shadow:10px 10px 10px gray;
        cursor:pointer;
        margin:3px;
        border:2px;

    }

footer{
    background:#111827;
    color:white;
    padding:15px;
    font-size:18px;
    text-align:center;
    border-radius:10px;
}


</style>
</head>

<body>
     <header>
        COLOR BOX
     </header>
   

    <main>

        <div class="color-container" id="box"

         <h1>Click Any Color</h1>
         <table border="0" cellpadding="2">
    </main>
        

            <script>
                var row = 10
                var col = 10
            var c = 1
            while(c<=row)
            {



                document.write("<tr>")
                           for(var i = 1;i<=col;i++)
                               {


                                var red = Math.round(Math.random()*255)
            var green = Math.round(Math.random()*255)
            var blue = Math.round(Math.random()*255)
            var mycolor=`rgb(${red},${green},${blue})`

                               document.write("<td><button onclick='setcolor(this)'style='color:red;background:"+mycolor+"'></button>")
                            
                               }

            document.write("</tr>")


            c++

            function setcolor(d)
            {
                //alert(d.style.background)
                document.body.style.background = d.style.background
            }

             }
            document.title = "Ready"
          
            </script>
        </table>
    </div>
</main>

<footer>
    <p>© 2026 | Practice Work By Ruchika</p>
</footer>
    
</body>
</html>
