
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Color Mixer</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Georgia, 'Times New Roman', serif;
            transition: background 0.1s ease;
            background-color: #a87671; 
        }

        .glass-card {   
            background:#FED9B7;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.1);
            border: 1px solid rgba(226, 225, 225, 0.5);
            width: 320px;
        }

        h1 {
            background:#552a02;
            color: #00AFB9;
            font-size: 24px;
            margin-top: 0;
            margin-bottom: 30px;
            text-align: center;
        }

        .input-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-size: 14px;
            color: #353333;
            font-weight: bold;
            margin-bottom: 8px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        input[type="color"] {
            width: 100%;
            height: 45px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            background: none;
        }

        input[type="range"] {
            width: 100%;
            cursor: pointer;
        }

        #red { accent-color: #ff4d4d; }
        #green { accent-color: #00cc66; }
        #blue { accent-color: #3385ff; }

        .back-btn{
                margin-top:25px;
                display:inline-block;
                padding:12px 25px;
                background:#978F66;
                color:#995F2F;
                text-decoration:none;
                border-radius:30px;
                font-weight:bold;
                transition:0.3s;

          }

        .back-btn:hover{
                background:#e68900;
                transform:scale(1.05);
          }

    </style>
</head>
<body>

    <div class="glass-card">
        <h1>Color Studio</h1>
        
        <div class="input-group">
            <label>Master Color Picker</label>
            <input type="color" id="mycolor" value="#ffe4e1">
        </div>
        
        <div class="input-group">
            <label>Red</label>
            <input type="range" min="20" max="255" value="255" id="red">
        </div>
        
        <div class="input-group">
            <label>Green</label>
            <input type="range" min="20" max="255" value="228" id="green">
        </div>
        
        <div class="input-group">
            <label>Blue</label>
            <input type="range" min="20" max="255" value="225" id="blue">
        </div>
    </div>

    <script>
        var d = document.getElementById("mycolor")
        var red = document.getElementById("red")
        var green = document.getElementById("green")
        var blue = document.getElementById("blue")

        d.onchange = function()
        {
            document.body.style.background = this.value
        }

        red.oninput = function()
        {
            document.title = "R: " + this.value
            var c2 = `rgb(${red.value},${green.value},${blue.value})`
            document.body.style.background = c2
        }

        green.oninput = function()
        {
            document.title = "G: " + this.value
            var c2 = `rgb(${red.value},${green.value},${blue.value})`
            document.body.style.background = c2
        }

        blue.oninput = function()
        {
            document.title = "B: " + this.value
            var c2 = `rgb(${red.value},${green.value},${blue.value})`
            document.body.style.background = c2
        }
    </script>

    <a href="Practice Page.html" class="back-btn">Back</a>
</body>
</html>
