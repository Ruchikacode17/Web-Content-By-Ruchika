        margin:20px;
        transition:0.50s;
        cursor:pointer;
    }

</style>
<body>
    <h1>Loop in HTML (for loop)</h1>

    <script>

        {

            document.title="No Error"
            for(var i = 1;i<=10;i++)
        {
            var p = new image()
            document.body.appendChild(p)
            p."className"="pic"
            p.src="images/p"+i+".jpg"

            p.onmouseover = function()
            {
                this.style.width="35%"
            }

            p.onmouseover = function()
            {
                this.style.width="30%"
            }


        }
