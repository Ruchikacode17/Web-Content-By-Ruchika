<h1>
Zoom rotating Banner
</h1>

<img src="images/m5.jpg" class="pic">

<body>
    <script>
        // Finding images in DOM

        var plist = document.getElementsByTagName("img")
        var p1 = plist[3]
        var p2 = plist[2]
          var p3 = plist[1]
            var p4 = plist[0]

            var c = -1


            function runbanner()
            {
                switch(c)
                {
                    case 0 :
                        p1.style.transform="scale(0) rotate(360deg)"
                        p1.style.opacity = 0
                        break;


                         case 1 :
                               p2.style.transform="scale(0) rotate(360deg)"
                        p2.style.opacity = 0
                        break;

                         case 2 :
                               p3.style.transform="scale(0) rotate(360deg)"
                        p3.style.opacity = 0
                        break;

                         case 3 :
                        
                        break;

                        
                         case 4 :
                            p1.style.transform="scale(1) rotate(0)"
                            p2.style.transform="scale(1) rotate(0)"
                            p3.style.transform="scale(1) rotate(0)"
                            p4.style.transform="scale(1) rotate(0)"
                         
                            p1.style.opacity = 1
                            p2.style.opacity = 1
                            p3.style.opacity = 1
                            p4.style.opacity = 1

                        
                        break;
                }


                if(c<=plist.length)
                {
                    c++
                }
                else
                {
                    c=0
                }

  setTimeout("runbanner()",5000)   
}          

   runbanner()
            
    </script>
