<style>
body{
    padding: 0;

header
{
font-size:30px;

<header>
Random Colour of Background
</header>

    <script>
        var b = document.createElement("button")
        b.innerHTML="Change Random Colours"
        document.body.appendChild(b)

        b.innerHTML="Change the Background Colours"
        b.style.padding="15px 25px"
        b.style.fontSize="20px"
        b.style.background="brown"
        b.style.color="white"
        b.style.border="none"
        b.style.borderRadius="10px"
        b.style.cursor="pointer"
        b.style.margin="130px auto"
        b.style.transition="0.50s"
        b.style.display="block"

    function randomcolor()
        {
            var red= Math.round(Math.random()*255)
            var green= Math.round(Math.random()*255)
            var blue= Math.round(Math.random()*255)
            var c = "rgb("+red+","+green+","+blue+")"
            //alert(c)
            document.body.style.background= c
        }
        b.onclick = randomcolor
        
            b.onmouseover= function()
        {
            b.style.transform= "scale(1.2)"
        }
         b.onmouseout= function()
        {
            b.style.transform= "scale(1)"
        }
    </script>
