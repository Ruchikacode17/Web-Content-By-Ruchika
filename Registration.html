<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration | Ruchika Portfolio</title>
    
    <link href="main.css" rel="stylesheet" type="text/css">
    
    <style>
        /* 1. Basic Reset */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: #f4f7f6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* 2. Navigation */
        nav {
            width: 100%;
            background: #333;
            padding: 15px;
            text-align: center;
            margin-bottom: 30px;
        }

        nav a { color: white; text-decoration: none; margin: 0 15px; font-weight: bold; }
        nav a:hover { color: cyan; }

        /* 3. Form Styling */
        .form-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 600px;
        }

        table { width: 100%; }
        
        caption {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
            border-bottom: 2px solid cyan;
            display: inline-block;
            padding-bottom: 5px;
        }

        td { padding: 12px 5px; vertical-align: top; }

        label { font-weight: 600; color: #555; }

        /* Input Styling */
        input[type="text"], 
        input[type="number"], 
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            outline: none;
        }

        input:focus, textarea:focus { border-color: cyan; box-shadow: 0 0 5px rgba(0,255,255,0.2); }

        /* Buttons */
        .btn-row { text-align: center; padding-top: 20px; }
        
        input[type="submit"], 
        input[type="reset"] {
            padding: 10px 25px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            margin: 0 5px;
        }

        input[type="submit"] { background-color: cyan; color: #333; }
        input[type="reset"] { background-color: #eee; color: #777; }

        input[type="submit"]:hover { background-color: #00cccc; transform: translateY(-2px); }

        footer { margin-top: auto; padding: 20px; color: #888; font-size: 14px; }
    </style>
</head>

<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="#">Projects</a>
        <a href="#">Contact</a>
    </nav>

    <main class="form-container">
        <form action="http://tataplay/user/login.php" method="post">
            <table border="0">
                <caption>Student Registration</caption>

                <tr>
                    <td><label for="forname">Full Name</label></td>
                    <td><input title="Type name here" placeholder="Ruchika Singh" id="forname" name="user_name" type="text" required></td>
                </tr>

                <tr>
                    <td><label for="forage">Age</label></td>
                    <td><input title="Type Age Here" placeholder="18-40" id="forage" name="user_age" type="number" required max="40" min="18"></td>
                </tr>

                <tr>
                    <td><label for="msg">Message</label></td>
                    <td><textarea id="msg" name="message" rows="5" placeholder="Tell us about your creative goals..."></textarea></td>
                </tr>

                <tr>
                    <td><label>Gender</label></td>
                    <td>
                        <input type="radio" value="Male" name="gender" id="m"> <label for="m" style="font-weight: 400;">Male</label>
                        <input type="radio" value="Female" name="gender" id="f" style="margin-left:10px;"> <label for="f" style="font-weight: 400;">Female</label>
                    </td>
                </tr>

                <tr>
                    <td><label>Hobbies</label></td>
                    <td>
                        <input type="checkbox" name="hobbies[]" value="Graphic Design" id="h1"> <label for="h1" style="font-weight: 400;">Design</label>
                        <br>
                        <input type="checkbox" name="hobbies[]" value="Video Editing" id="h2"> <label for="h2" style="font-weight: 400;">Editing</label>
                        <br>
                        <input type="checkbox" name="hobbies[]" value="Searching" id="h3"> <label for="h3" style="font-weight: 400;">Research</label>
                    </td>
                </tr>

                <tr>
                    <td colspan="2" class="btn-row">
                        <input type="submit" value="Register Now">
                        <input type="reset" value="Clear Form">
                    </td>
                </tr>
            </table>
        </form>
    </main>

    <footer>
        <p>&copy;Project By Ruchika</p>
    </footer>
    
</body>
</html>
