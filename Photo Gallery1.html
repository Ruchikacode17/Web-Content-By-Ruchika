<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Ruchika">
    <title>Practice Hub | Ruchika Singh</title>
    
    <style>
        /* 1. Global Setup */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: background 0.4s ease;
            line-height: 1.6;
            padding: 20px;
        }

        /* 2. Navigation & Back Button */
        .nav-container {
            width: 90%;
            margin: 0 auto 20px auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-btn {
            padding: 10px 20px;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 2px 5px 10px rgba(0,0,0,0.2);
        }

        .back-btn:hover {
            background-color: orange;
            transform: scale(1.05);
        }

        nav ol {
            display: flex;
            list-style: none;
            gap: 15px;
            flex-wrap: wrap;
        }

        nav li {
            background: black;
            padding: 10px 15px;
            border-radius: 5px;
        }

        nav li a { color: orange; text-decoration: none; font-weight: bold; font-size: 14px; }

        /* 3. Header & Banner Section */
        header {
            width: 90%;
            margin: 0 auto 40px auto;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            border: 2px solid black;
            padding: 20px;
            background: white;
            border-radius: 15px;
        }

        #col1 {
            width: 120px;
            height: 120px;
            border: 2px solid black;
            border-radius: 50%;
            overflow: hidden;
            background: #eee;
        }

        .profile-img { width: 100%; height: 100%; object-fit: cover; }

        #col2 {
            width: 75%;
            height: 150px;
            border: 2px solid black;
            border-radius: 10px;
            overflow: hidden;
        }

        .banner-img { width: 100%; height: 100%; object-fit: cover; }

        /* 4. Main Practice List */
        main {
            width: 85%;
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h1 { border-bottom: 4px solid orange; display: inline-block; margin-bottom: 20px; }

        .practice-list { margin-left: 20px; }
        .practice-list li { margin-bottom: 12px; font-size: 18px; }
        .practice-list a { color: #0066cc; text-decoration: none; }
        .practice-list a:hover { text-decoration: underline; }

        /* --- 5. RESPONSIVE MEDIA QUERIES --- */

        /* Mobile */1
        @media only screen and (max-width: 600px) {
            body { background: Orange; }
            #col2 { display: none; }
            header { justify-content: center; }
            .nav-container { flex-direction: column; gap: 20px; }
        }

        /* Tablet */
        @media only screen and (min-width: 601px) {
            body { background: lavender; }
        }
