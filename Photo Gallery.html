<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Gallery</title>
    
    <style>
        /* 1. Animation*/
        @keyframes zoomIn {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        body {
            background-color: #f4f4f4;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        /* 2. Header Style - Fixed the font typography */
        header {
            width: 60%;
            background: black;
            color: white;
            font-size: 40px;
            font-family: "Arial Black", Gadget, sans-serif;
            text-align: center;
            padding: 20px;
            margin: 20px auto 40px auto;
            border-radius: 10px;
            box-shadow: 0px 10px 15px rgba(0,0,0,0.3);
        }

        /* 3. Gallery Layout - Using Flexbox for better organization */
        main {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px; /* Space between images */
            width: 90%;
            margin: auto;
        }

        /* 4. Image Style - Reduced border-radius */
        .picstyle {
            width: 280px;
            height: 280px;
            object-fit: cover; /* Keeps images from looking stretched */
            box-shadow: 5px 10px 15px gray;
            border-radius: 15px;
            transition: all 0.5s ease;
            animation: zoomIn 1s ease;
        }

        /* 5. Hover Effect - Smooth scale and rotation */
        .picstyle:hover {
            transform: scale(1.1) rotate(5deg);
            border-radius: 25px;
            box-shadow: 0px 15px 25px rgba(0,0,0,0.4);
            border: 3px solid black;
        }

        footer {
            text-align: center;
            margin-top: 50px;
            color: #777;
        }

        /* Back Button for project navigation */
        .back-btn {
            display: block;
            width: 120px;
            margin: 20px auto;
            text-align: center;
            padding: 10px;
            background: #333;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>

<body>

    <header>
        WEB Photo Gallery
    </header>

    <main>
        <a href="p1.html"><img src="images/p1.jpg" class="picstyle" alt="Photo 1"></a>
        <a href="p2.html"><img src="images/p2.jpg" class="picstyle" alt="Photo 2"></a>
        <a href="p3.html"><img src="images/p3.jpg" class="picstyle" alt="Photo 3"></a>
        <a href="p4.html"><img src="images/p4.jpg" class="picstyle" alt="Photo 4"></a>
        <a href="p5.html"><img src="images/p5.jpg" class="picstyle" alt="Photo 5"></a>
        <a href="p6.html"><img src="images/p6.jpg" class="picstyle" alt="Photo 6"></a>
        <a href="p7.html"><img src="images/p7.jpg" class="picstyle" alt="Photo 7"></a>
    </main>

    <a href="index.html" class="back-btn">Back to Home</a>

    <footer>
        <p>&copy;Project Gallery </p>
    </footer>

</body>
</html>
