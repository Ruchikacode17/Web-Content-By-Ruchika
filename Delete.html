<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Portfolio | Arena Student Project</title>
    <style>
        /* Global Reset */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            transition: background 0.5s ease; /* Smooth transition for media queries */
            padding: 20px;
        }

        /* Header Layout */
        header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            border: 2px solid black;
            padding: 20px;
            margin-bottom: 30px;
            background: white;
            border-radius: 10px;
        }

        #col1 {
            width: 100px; height: 100px;
            border: 2px solid black;
            border-radius: 50%; /* Circle for Profile Pic */
            display: flex;
            align-items: center; justify-content: center;
            background: #eee;
        }

        #col2 {
            width: 70%; height: 150px;
            border: 2px solid black;
            display: flex;
            align-items: center; justify-content: center;
            background: #f9f9f9;
            font-weight: bold;
            font-size: 24px;
        }

        /* Main Gallery Grid */
        main {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }

        .cardstyle {
            width: 300px;
            height: 200px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .cardstyle:hover { transform: translateY(-5px); }

        .pic {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Prevents image stretching */
            display: block;
        }

        /* --- RESPONSIVE MEDIA QUERIES --- */

        /* Phones (600px and down) */
        @media only screen and (max-width: 600px) {
            body { background: #e8f5e9; } /* Soft Green */
            #col2 { display: none; }
            #col1 { margin: auto; }
            header { justify-content: center; }
            .cardstyle { width: 90%; }
        }

        /* Tablets (600px to 768px) */
        @media only screen and (min-width: 600px) {
            body { background: #fffde7; } /* Soft Yellow */
            #col1 { width: 80px; height: 80px; }
            #col2 { width: 75%; height: 100px; }
            .cardstyle { width: 45%; }
        }

        /* Large Screens (992px and up) */
        @media only screen and (min-width: 992px) {
            body { background: #ffebee; } /* Soft Red */
            header { width: 90%; margin: 0 auto 30px auto; }
            #col2 { width: 85%; height: 350px; }
            #col1 { display: none; }
            .cardstyle { width: 22%; }
        }
    </style>
</head>

<body>

    <header>
        <div id="col1">Profile</div>
        <div id="col2">WHENIFY CREATIVE BANNER</div>
    </header>

    <main>
        <div class="cardstyle"><img src="images/p1.jpg" class="pic" alt="Photoshop Design"></div>
        <div class="cardstyle"><img src="images/p2.jpg" class="pic" alt="Premiere Pro Edit"></div>
        <div class="cardstyle"><div style="padding: 20px;">After Effects Motion Graphic</div></div>
        <div class="cardstyle"><div style="padding: 20px;">Illustrator Vector Art</div></div>
    </main>

    <footer style="text-align: center; margin-top: 40px; color: #666;">
        <p>&copy; 2026 Arena GTB Nagar Student Assignment</p>
    </footer>

</body>
</html>
