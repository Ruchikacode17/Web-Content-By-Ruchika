<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<style>
    @keyframes ani {
        from { 
            transform: rotateY(0deg) rotateX(0deg) rotateZ(0deg); 
        }
        to { 
            transform: rotateY(360deg) rotateX(340deg) rotateZ(230deg); 
        }
    }

    #container {
        width: 500px;
        height: 500px;
        background-color: black;
        margin: auto;
        display: flex;
        justify-content: center;
        align-items: center;
        perspective: 1000px;
    }

    #p1 {
        width: 300px;
        height: 300px;
        position: absolute; 
        animation: ani 5s linear infinite alternate;
        transform-style: preserve-3d;
    }

    #p2 {
        width: 300px;
        height: 300px;
        position: absolute; 
        animation: ani 5s linear infinite alternate;
        transform-style: preserve-3d;
        backface-visibility: hidden;
        transform: rotateY(180deg);
    }

    .pic {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border: 2px solid white;
    }
</style>
<body>

    <div id="container">
        <div id="p1">
            <img src="images/a6.jpg" class="pic">
        </div>

        <div id="p2">
            <img src="images/a13.jpg" class="pic">
        </div>
    </div>
    
</body>
</html>
