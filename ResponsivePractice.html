<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruchika Responsive Portfolio Practice</title>
    
    <style>
        /* 1. Global Reset */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            transition: background 0.5s ease; /* Smooth color change when resizing */
            padding: 20px;
        }

        /* 2. Header Layout */
        header {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            border: 2px solid black;
            padding: 20px;
            margin-bottom: 30px;
            background: white;
            border-radius: 10px;
        }

        #col1 {
            height: 100px;
            width: 100px;
            border: 2px solid black;
            border-radius: 50%; /* Perfect circle */
            display: flex;
            align-items: center;
            justify-content: center;
            background: #eee;
            font-size: 12px;
            text-align: center;
        }

        #col2 {
            width: 70%;
            height: 150px;
            border: 2px solid black;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f9f9f9;
            font-weight: bold;
            font-size: 24px;
        }

        /* 3. Main Gallery Grid */
        main {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }

        .cardstyle {
            background: white;
            border-radius: 8px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .cardstyle:hover {
            transform: translateY(-5px);
        }

        .pic {
            width: 100%;
            height: 180px;
            object-fit: cover; /* Keeps images from looking stretched */
            display: block;
        }

        .card-text {
            padding: 10px;
            text-align: center;
            font-weight: bold;
        }

        /* --- RESPONSIVE MEDIA QUERIES --- */

        /* Phones (600px and down) */
        @media only screen and (max-width: 600px) {
            body { background: #d4edda; } /* Soft Green */
            #col2 { display: none; } /* Hide banner to save space */
            #col1 { margin: auto; }
            header { justify-content: center; }
            .cardstyle { width: 90%; }
        }

        /* Tablets (600px to 768px) */
        @media only screen and (min-width: 600px) {
            body { background: #fff3cd; } /* Soft Yellow */
            #col1 { width: 80px; height: 80px; }
            #col2 { width: 75%; height: 100px; }
            .cardstyle { width: 45%; }
        }

        /* Laptops (768px to 992px) */
        @media only screen and (min-width: 768px) {
            body { background: #f8d7da; } /* Soft Pink */
            #col1 { width: 120px; height: 120px; }
            .cardstyle { width: 30%; }
        }

        /* Desktop (992px and up) */
        @media only screen and (min-width: 992px) {
            body { background: #fce4ec; } /* Lighter Red/Pink */
            header { width: 90%; margin: 0 auto 30px auto; }
            #col2 { width: 85%; height: 300px; }
            #col1 { display: none; } /* Focus on banner for Desktop */
            .cardstyle { width: 22%; }
        }
    </style>
</head>

<body>

    <header>
        <div id="col1">Profile Pic</div>
        <div id="col2">Banner Area</div>
    </header>

    <main>
        <div class="cardstyle">
            <img src="images/p1.jpg" class="pic" alt="Project 1">
            <div class="card-text">Project 1</div>
        </div>
        
        <div class="cardstyle">
            <img src="images/p2.jpg" class="pic" alt="Project 2">
            <div class="card-text">Project 2</div>
        </div>

        <div class="cardstyle"><img src="images/p3.jpg" class="pic" alt="P3"><div class="card-text">Project 3</div></div>
        <div class="cardstyle"><img src="images/p4.jpg" class="pic" alt="P4"><div class="card-text">Project 4</div></div>
        <div class="cardstyle"><img src="images/p5.jpg" class="pic" alt="P5"><div class="card-text">Project 5</div></div>
        <div class="cardstyle"><img src="images/p6.jpg" class="pic" alt="P6"><div class="card-text">Project 6</div></div>
        <div class="cardstyle"><img src="images/p7.jpg" class="pic" alt="P7"><div class="card-text">Project 7</div></div>
        <div class="cardstyle"><img src="images/p8.jpg" class="pic" alt="P8"><div class="card-text">Project 8</div></div>
    </main>

    <footer style="text-align: center; margin-top: 40px; color: #666;">
        <p>&copy; Ruchika Singh</p>
    </footer>

</body>
</html>
