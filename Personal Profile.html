<!DOCTYPE html>
<html>
<head>
    <title>My Profile</title>

    <style>
        body {
            margin: 0;
            font-family: Verdana;
            background-color: #0b0f1a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        
        .section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 85%;
            max-width: 1100px;
            gap: 50px;
        }

     
        .text {
            flex: 1;
        }

        h3 {
            color: #b39ddb;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 42px;
            color: #d1c4e9;
            margin: 10px 0;
        }

        p {
            color: #cfd8dc;
            max-width: 450px;
        }

       
        .image {
            flex: 1;
            text-align: center;
        }

        img {
            width: 260px;
            height: 260px;
            border-radius: 50%;
            border: 4px solid #b39ddb;
        }

        /* responsive */
        @media (max-width: 768px) {
            .section {
                flex-direction: column;
                text-align: center;
            }

            p {
                margin: auto;
            }

            h1 {
                font-size: 30px;
            }
        }

    </style>
</head>

<body>

    <div class="section">

       
        <div class="text">
            <h3>HELLO! I am Ruchika</h3>

            <h1>
                DESIGNS THAT<br>
                BRINGS IDEAS<br>
                TO LIFE
            </h1>

            <p>
                Aspiring UI/UX designer passionate about creating intuitive 
                and visually engaging digital experiences. Exploring design, 
                branding, and web interfaces while constantly learning and growing creatively.
            </p>
        </div>

       
        <div class="image">
            <img src="images/mypic1.jpg">
        </div>

    </div>

</body>
</html>
