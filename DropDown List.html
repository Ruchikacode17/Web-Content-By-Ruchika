<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Registration | Ruchika Singh</title>
    
    <link href="main.css" rel="stylesheet" type="text/css">

    <style>
        /* 1. Global Reset */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #f0f2f5;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        /* 2. Navigation & Back Button */
        nav {
            width: 100%;
            max-width: 700px;
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
        }

        .back-btn {
            padding: 10px 20px;
            background: #333;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .back-btn:hover { background: orange; }

        /* 3. Form Container Styling */
        main {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 700px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            border-bottom: 3px solid orange;
            display: block;
            padding-bottom: 10px;
        }

        /* 4. Table & Input Styling */
        table { width: 100%; border-collapse: collapse; }
        td { padding: 15px 5px; vertical-align: middle; }
        
        label { font-weight: bold; color: #555; }

        select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }

        /* Radio & Checkbox spacing */
        .choice-group { margin-right: 15px; cursor: pointer; }

        /* Button Styling */
        .btn-row { text-align: center; padding-top: 30px; }
        
        input[type="submit"], input[type="reset"] {
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: 0.3s;
            margin: 0 10px;
        }

        input[type="submit"] { background: orange; color: white; }
        input[type="reset"] { background: #eee; color: #777; }
